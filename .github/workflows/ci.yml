name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            packages/depfresh/pyproject.toml
            packages/depfresh-pro/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/depfresh[dev]" -e packages/depfresh-pro
      - name: Ruff lint
        run: ruff check --output-format=github packages
      - name: Ruff format
        run: ruff format --check packages
      - name: Mypy
        run: mypy

  test:
    name: Test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        include:
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            packages/depfresh/pyproject.toml
            packages/depfresh-pro/pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/depfresh[dev]" -e packages/depfresh-pro
      - name: Run tests
        run: pytest -q --cov=depfresh --cov=depfresh_pro --cov-report=term-missing --cov-fail-under=85

  build:
    name: Build & verify packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build both packages
        run: |
          python -m pip install --upgrade pip build twine
          python -m build packages/depfresh
          python -m build packages/depfresh-pro
      - name: Check distribution metadata
        run: twine check packages/depfresh/dist/* packages/depfresh-pro/dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            packages/depfresh/dist/*
            packages/depfresh-pro/dist/*
          if-no-files-found: error

  # Single aggregate gate: branch protection requires only this check.
  ci-success:
    name: CI success
    if: always()
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          for result in ${{ join(needs.*.result, ' ') }}; do
            if [ "$result" != "success" ]; then
              echo "A required job concluded with: $result"
              exit 1
            fi
          done
          echo "All CI jobs succeeded."
